name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: 🔍 Lint, type check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: 💅 Lint
        run: npx prettier --check .

      - name: 🔒 Type check
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        run: npm test
