version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      contentful:
        patterns:
          - 'contentful-management'
          - '@contentful/*'
      ai:
        patterns:
          - '@anthropic-ai/*'
      dev-tools:
        patterns:
          - 'typescript'
          - 'prettier'
          - 'tsx'
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
